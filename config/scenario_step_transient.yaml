# Step load transient scenario: 1C → 5C at t = 120 s
# Headline result A: MPC holds T_cell < 35 °C and ΔT < 5 °C;
# PID briefly violates due to thermal lag on the serial coolant chain.
#
# Usage:
#   ./btm config/scenario_step_transient.yaml pid
#   ./btm config/scenario_step_transient.yaml mpc

cell:
  capacity_ah: 4.5
  nominal_voltage_v: 3.6
  mass_kg: 0.070
  specific_heat_j_per_kg_k: 900
  surface_area_m2: 0.00475
  eta_ir_1c_v: 0.077837
  model: single_node               # single_node (default) | two_node (DESIGN.md §3.1.3)
  # Two-node parameters (uncomment when model: two_node):
  # r_core_can_k_per_w: 0.8       # core→can resistance; ~7°C ΔT_core_can at 5C
  # c_can_fraction: 0.10           # fraction of C_th in can shell

module:
  series_count: 24
  parallel_count: 13

coolant:
  density_kg_per_m3: 805
  specific_heat_j_per_kg_k: 3500
  dynamic_viscosity_pa_s: 0.012565
  thermal_conductivity_w_per_m_k: 0.13
  inlet_temperature_c: 25.0

convection:
  model: power_law
  h_ref_w_per_m2_k: 250
  m_dot_ref_kg_per_s: 0.5
  scaling_exponent: 0.6

thermal_constraints:
  max_cell_temperature_c: 35.0
  max_temperature_delta_c: 5.0

pump:
  min_flow_kg_per_s: 0.01
  max_flow_kg_per_s: 2.0

simulation:
  duration_s: 300.0
  timestep_s: 0.1
  log_path: "results/step_transient.csv"

scenario:
  type: step_transient
  initial_c_rate: 1.0
  final_c_rate: 5.0
  step_time_s: 120.0

sensor:
  mode: perfect                    # perfect | downstream | sparse
  # Set to "downstream" to simulate a realistic single-sensor PID:
  # the controller reacts to cell[23] (hottest physical location) rather than
  # the true global max, demonstrating sensor placement impact on control quality.

controller:
  type: mpc         # override on command line: ./btm ... pid
  pid:
    kp: 0.06                       # conservative gains — adequate for slow drift,
    ki: 0.002                      # but lags hard step transient → constraint violation
    setpoint_c: 33.0               # margin eroded by the 1C→5C step
    integrator_limit: 100.0
    deadband_c: 0.0                # |error| < deadband_c treated as zero (0.0 = disabled)
  mpc:
    horizon_steps: 20              # DESIGN.md §3.4: N=20 (2s preview) is the principled choice
    setpoint_c: 34.9               # 0.1 °C below hard limit for numerical margin
    soft_T_max_penalty: 10000.0    # quadratic penalty (J/°C²) when T_cell > max_cell_temperature_c
    soft_dT_penalty: 10000.0       # quadratic penalty (J/°C²) when ΔT > max_temperature_delta_c
    weights:
      tracking: 0.5
      delta_t: 5.0
      pump_energy: 1.5
      input_rate: 0.5
    solver:
      max_iterations: 50
      step_size: 0.005
      convergence_tol: 1.0e-4
      finite_diff_epsilon: 1.0e-4
